<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PreventX Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center pt-12 pb-8 px-6">
<div class="flex items-center justify-center bg-primary/20 p-4 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-5xl">shield_with_heart</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight">PreventX</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Safety monitoring &amp; risk prediction</p>
</header>
<!-- Hero Graphic -->
<div class="px-6 mb-8">
<div class="relative w-full h-44 rounded-xl overflow-hidden bg-background-dark/50 border border-primary/10">
<div class="absolute inset-0 opacity-40 bg-gradient-to-br from-primary/20 via-transparent to-primary/10"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-full bg-[url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?q=80&amp;w=800&amp;auto=format&amp;fit=crop')] bg-cover bg-center mix-blend-overlay" data-alt="Abstract glowing network representing data and safety monitoring"></div>
</div>
<div class="absolute bottom-4 left-4">
<span class="bg-primary text-background-dark text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">Secure Access</span>
</div>
</div>
</div>
<!-- Welcome Text -->
<div class="px-6 mb-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 mt-1">Sign in to your dashboard to monitor risks</p>
</div>
<!-- Login Form -->
<div class="flex flex-col gap-5 px-6 pb-12 flex-1">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="form-input w-full pl-12 pr-4 h-14 rounded-lg border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 focus:ring-1 focus:ring-primary focus:border-primary text-slate-900 dark:text-white placeholder-slate-400 transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="form-input w-full pl-12 pr-12 h-14 rounded-lg border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 focus:ring-1 focus:ring-primary focus:border-primary text-slate-900 dark:text-white placeholder-slate-400 transition-all" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">visibility</button>
</div>
</div>
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-background-dark font-bold rounded-lg transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
                Sign In
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
<span class="flex-shrink mx-4 text-xs text-slate-400 uppercase tracking-widest font-medium">Or continue with</span>
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.27.81-.57z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.702z"></path>
</svg>
                    Apple
                </button>
</div>
</div>
<!-- Footer -->
<footer class="p-6 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Sign Up</a>
</p>
<div class="mt-8 flex justify-center gap-6">
<span class="text-[10px] text-slate-400 uppercase tracking-widest">Privacy Policy</span>
<span class="text-[10px] text-slate-400 uppercase tracking-widest">Terms of Service</span>
</div>
</footer>
<!-- iOS Home Indicator Spacing -->
<div class="h-8"></div>
</div>
</body></html>
