<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PreventX - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <!-- Header -->
        <header class="flex items-center justify-between px-4 pt-6 pb-2">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/20 text-primary">
                    <span class="material-symbols-outlined">admin_panel_settings</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight tracking-tight">PreventX Admin</h1>
                    <p class="text-xs text-slate-500 dark:text-primary/70">Control Panel</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold">{{ user }}</span>
                <button onclick="window.location.href='/logout'"
                    class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-200 dark:bg-red-500/20 text-slate-700 dark:text-red-500 transition hover:bg-slate-300 dark:hover:bg-red-500/30">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col p-4 gap-4 mt-4 max-w-lg mx-auto w-full">

            <div class="px-2 py-2 text-center mb-2">
                <h2 class="text-2xl font-bold dark:text-white">Admin Dashboard</h2>
                <p class="text-sm text-slate-500 dark:text-primary/70">Manage datasets and monitor system analytics</p>
            </div>

            <!-- Add Accident -->
            <button onclick="window.location.href='/admin/add-accident'"
                class="flex w-full cursor-pointer items-center justify-start gap-4 rounded-xl h-16 px-4 bg-white dark:bg-primary/10 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-primary font-bold shadow-sm hover:bg-slate-50 dark:hover:bg-primary/20 transition">
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-primary/20 text-primary">
                    <span class="material-symbols-outlined">add_circle</span>
                </div>
                <span class="text-left flex-1">Add New Accident Record</span>
                <span class="material-symbols-outlined text-slate-400">chevron_right</span>
            </button>

            <!-- Recompute Hotspots -->
            <button onclick="window.location.href='/admin/recompute-hotspots'"
                class="flex w-full cursor-pointer items-center justify-start gap-4 rounded-xl h-16 px-4 bg-white dark:bg-primary/10 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-primary font-bold shadow-sm hover:bg-slate-50 dark:hover:bg-primary/20 transition">
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-primary/20 text-primary">
                    <span class="material-symbols-outlined">sync</span>
                </div>
                <span class="text-left flex-1">Recompute Hotspots (DBSCAN)</span>
                <span class="material-symbols-outlined text-slate-400">chevron_right</span>
            </button>

            <!-- Analytics Dashboard -->
            <button onclick="window.location.href='/admin/analytics'"
                class="flex w-full cursor-pointer items-center justify-start gap-4 rounded-xl h-16 px-4 bg-white dark:bg-primary/10 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-primary font-bold shadow-sm hover:bg-slate-50 dark:hover:bg-primary/20 transition">
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-primary/20 text-primary">
                    <span class="material-symbols-outlined">bar_chart</span>
                </div>
                <span class="text-left flex-1">View Analytics Dashboard</span>
                <span class="material-symbols-outlined text-slate-400">chevron_right</span>
            </button>

            <!-- View Hotspots -->
            <button onclick="window.location.href='/hotspots'"
                class="flex w-full cursor-pointer items-center justify-start gap-4 rounded-xl h-16 px-4 mt-4 bg-primary text-background-dark font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition active:scale-95">
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-background-dark/20">
                    <span class="material-symbols-outlined text-background-dark">map</span>
                </div>
                <span class="text-left flex-1">View Accident Hotspots Live Map</span>
            </button>

        </main>

    </div>
</body>

</html>
