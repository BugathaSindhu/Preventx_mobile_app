<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PreventX - Admin Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <!-- Header -->
        <header
            class="flex items-center justify-between px-4 pt-6 pb-2 border-b border-slate-200 dark:border-primary/10">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='/admin'"
                    class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div>
                    <h1 class="text-lg font-bold leading-tight tracking-tight">Admin Analytics</h1>
                    <p class="text-xs text-slate-500 dark:text-primary/70">Traffic Accident Dashboard</p>
                </div>
            </div>
        </header>

        <main class="flex-1 flex flex-col p-4 gap-6 mt-2 max-w-4xl mx-auto w-full">

            <!-- Total Summary Card -->
            <div
                class="px-6 py-6 bg-gradient-to-br from-primary/20 to-primary/5 rounded-2xl border border-primary/20 shadow-lg text-center">
                <h3 id="total"
                    class="text-2xl font-bold text-slate-900 dark:text-white flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-primary text-3xl animate-pulse">analytics</span>
                    Loading total accidents...
                </h3>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                <!-- Severity Chart Card -->
                <div
                    class="flex flex-col rounded-2xl bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 p-5 shadow-lg">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-bold text-slate-700 dark:text-white flex items-center gap-2">
                            <span class="material-symbols-outlined text-red-500">warning</span>
                            Accident Severity Distribution
                        </h3>
                    </div>
                    <div class="flex-1 min-h-[250px] relative">
                        <canvas id="severityChart"></canvas>
                    </div>
                </div>

                <!-- Weather Chart Card -->
                <div
                    class="flex flex-col rounded-2xl bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 p-5 shadow-lg">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-bold text-slate-700 dark:text-white flex items-center gap-2">
                            <span class="material-symbols-outlined text-blue-500">cloud</span>
                            Weather vs Accidents
                        </h3>
                    </div>
                    <div class="flex-1 min-h-[250px] relative">
                        <canvas id="weatherChart"></canvas>
                    </div>
                </div>

                <!-- Traffic Density Chart Card (Spans full width on large screens) -->
                <div
                    class="flex flex-col rounded-2xl bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 p-5 shadow-lg lg:col-span-2">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-bold text-slate-700 dark:text-white flex items-center gap-2">
                            <span class="material-symbols-outlined text-orange-500">traffic</span>
                            Traffic Density vs Accidents
                        </h3>
                    </div>
                    <div class="flex-1 min-h-[300px] relative">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>

            </div>

        </main>

    </div>

    <script>
        // PreventX Dark Theme Config for Charts
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        fetch("/admin/analytics-data")
            .then(res => res.json())
            .then(data => {

                if (data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById("total").innerHTML =
                    `<span class="material-symbols-outlined text-primary text-3xl">database</span> Total Accidents in Dataset: <span class="text-primary ml-2">${data.total_accidents}</span>`;

                // Severity Pie Chart
                new Chart(document.getElementById("severityChart"), {
                    type: "pie",
                    data: {
                        labels: Object.keys(data.severity),
                        datasets: [{
                            data: Object.values(data.severity),
                            backgroundColor: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0' } } }
                    }
                });

                // Weather Bar Chart
                new Chart(document.getElementById("weatherChart"), {
                    type: "bar",
                    data: {
                        labels: Object.keys(data.weather),
                        datasets: [{
                            label: "Accidents by Weather",
                            data: Object.values(data.weather),
                            backgroundColor: '#3b82f6',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });

                // Traffic Bar Chart
                new Chart(document.getElementById("trafficChart"), {
                    type: "bar",
                    data: {
                        labels: Object.keys(data.traffic),
                        datasets: [{
                            label: "Accidents by Traffic Density",
                            data: Object.values(data.traffic),
                            backgroundColor: '#f97316',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });

            })
            .catch(err => {
                console.error("Analytics load error:", err);
            });
    </script>

</body>

</html>
