<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PreventX - User Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <!-- Header -->
        <header class="flex items-center justify-between px-4 pt-6 pb-2">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/20 text-primary">
                    <span class="material-symbols-outlined">account_circle</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight tracking-tight">PreventX</h1>
                    <p class="text-xs text-slate-500 dark:text-primary/70">Safety Monitoring</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold">{{ user }}</span>
                <button onclick="window.location.href='/logout'"
                    class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-200 dark:bg-red-500/20 text-slate-700 dark:text-red-500">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col pb-24">
            <!-- Action Forms -->
            <div class="px-4 py-4 flex flex-col gap-4">

                <button onclick="getLocation()"
                    class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-xl h-14 bg-primary text-background-dark font-bold transition-transform active:scale-95 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined">my_location</span>
                    <span>Get Current Location</span>
                </button>

                <div class="flex gap-4">
                    <input type="text" id="lat" placeholder="Latitude"
                        class="w-1/2 h-12 px-4 rounded-lg bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-1 focus:ring-primary focus:border-primary" />
                    <input type="text" id="lon" placeholder="Longitude"
                        class="w-1/2 h-12 px-4 rounded-lg bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-1 focus:ring-primary focus:border-primary" />
                </div>

                <button onclick="predictRisk()"
                    class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-xl h-12 bg-white dark:bg-primary/10 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-primary font-bold shadow-sm">
                    <span class="material-symbols-outlined">search</span>
                    <span>Predict Lat/Lon Risk</span>
                </button>

                <div class="relative group mt-2">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary">place</span>
                    <input type="text" id="place" placeholder="Search Place (e.g. Hyderabad)"
                        class="w-full h-14 pl-12 pr-4 rounded-lg bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-1 focus:ring-primary focus:border-primary z-10" />
                </div>

                <button onclick="predictPlace()"
                    class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-xl h-12 bg-white dark:bg-primary/10 border border-slate-200 dark:border-primary/20 text-slate-900 dark:text-primary font-bold shadow-sm">
                    <span class="material-symbols-outlined">explore</span>
                    <span>Predict Place Risk</span>
                </button>
            </div>

            <!-- Risk Status Card -->
            <div class="px-4 py-2 mt-2">
                <div
                    class="flex flex-col rounded-xl overflow-hidden shadow-xl bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/10">
                    <div class="flex flex-col gap-1 p-5">
                        <div class="flex items-center justify-between">
                            <p class="text-slate-500 dark:text-primary/60 text-sm font-medium uppercase tracking-wider">
                                Safety Status</p>
                            <span class="flex h-3 w-3 rounded-full bg-primary animate-pulse"></span>
                        </div>

                        <div id="result"
                            class="mt-4 p-4 rounded-lg bg-white dark:bg-primary/10 text-sm text-slate-800 dark:text-slate-200 border border-slate-200 dark:border-primary/20 whitespace-pre-line font-medium min-h-[100px]">
                            Analysis results will appear here...
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-4 mt-6">
                <button onclick="window.location.href='/hotspots'"
                    class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-xl h-14 bg-red-500/10 border border-red-500/20 text-red-500 font-bold transition-transform active:scale-95 shadow-lg shadow-red-500/10">
                    <span class="material-symbols-outlined">warning</span>
                    <span>See Accident Hotspots Map</span>
                </button>
            </div>
        </main>

    </div>

    <script>
        // Logic exactly as before!
        function getLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation not supported");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                pos => {
                    document.getElementById("lat").value = pos.coords.latitude;
                    document.getElementById("lon").value = pos.coords.longitude;
                },
                () => {
                    alert("Location permission denied");
                }
            );
        }

        function predictRisk() {
            const lat = document.getElementById("lat").value;
            const lon = document.getElementById("lon").value;
            const result = document.getElementById("result");

            result.innerText = "Analyzing risk...";
            result.style.color = "#94a3b8";

            fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    latitude: lat,
                    longitude: lon
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        result.innerText = "❌ " + data.error;
                        result.style.color = "#ef4444";
                    } else {
                        result.innerText =
                            `🚨 Risk: ${data.severity}\n🌦 Weather: ${data.weather}\n🚗 Traffic: ${data.traffic_density}\n🛣 Road: ${data.road_type}\n📊 Confidence: ${data.confidence}`;
                        result.style.color = "#13ec5b";
                    }
                })
                .catch(() => {
                    result.innerText = "❌ Error getting prediction";
                    result.style.color = "#ef4444";
                });
        }

        function predictPlace() {
            const place = document.getElementById("place").value;
            const result = document.getElementById("result");

            if (!place) {
                result.innerText = "❌ Please enter a place name";
                result.style.color = "#ef4444";
                return;
            }

            result.innerText = "🔍 Finding location & predicting risk...";
            result.style.color = "#94a3b8";

            fetch("/predict-place", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ place: place })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        result.innerText = "❌ " + data.error;
                        result.style.color = "#ef4444";
                    } else {
                        // Auto-fill coordinates
                        document.getElementById("lat").value = data.latitude;
                        document.getElementById("lon").value = data.longitude;

                        result.innerText =
                            `📍 Place: ${data.place}\n🚨 Risk: ${data.severity}\n📊 Confidence: ${data.confidence}\n🌦 Weather: ${data.weather}\n🚗 Traffic: ${data.traffic_density}\n🛣 Road: ${data.road_type}`;

                        result.style.color = "#13ec5b";
                    }
                })
                .catch((err) => {
                    console.error(err);
                    result.innerText = "❌ Error predicting for selected place";
                    result.style.color = "#ef4444";
                });
        }
    </script>
</body>

</html>
